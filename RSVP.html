    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="css/styles.css"/>
    <link rel="stylesheet" href="css/animations.css"/>
    <link rel="stylesheet" href="css/navigation.css"/>

</head>
<body class="dark-bg">
    
     <!-- Hamburger Menu -->
    <button class="menu-toggle" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

        <a href="RSVP.html">RSVP</a>
    </nav>
    
    <div class="menu-overlay"></div>
    

    <!-- RSVP Section -->
    <section id="RSVP-page">
        <div class="container-fluid h-100 g-0">
            <div class="row align-items-stretch h-100 g-0">
                <!-- Text Column -->
                <div class="col-12 col-md-6 order-2 order-md-1 rsvp-text-column">
                    <p class="fade-in-delay-1 fade-in-no-y" id="rsvpTitle">Please RSVP with us by November 1, 2026.</p>
                    <button class="fade-in-delay-2 fade-in-no-y rsvp-btn-open" onclick="openRSVPModal()">RSVP Now</button>
                </div>
                <!--Image Column-->
                <div class="col-12 col-md-6 order-1 order-md-2 rsvp-image-column g-0">
                    <div class="rsvp-image-container">
                        <img src="assets/ring.jpeg" alt="RSVP Image" class="img-fluid">
                    </div>
            </div>
            
        </div>
    </section>

    <!-- RSVP Modal -->
    <div id="rsvpModal" class="rsvp-modal">
        <div class="rsvp-modal-content">
            <span class="rsvp-close" onclick="closeRSVPModal()">&times;</span>
            
            <h2 class="rsvp-modal-title">RSVP</h2>
            
            <div class="success-message" id="modalSuccessMessage">
                Thank you for your RSVP! We can't wait to celebrate with you.
            </div>
            
            <div class="error-message" id="modalErrorMessage">
                Something went wrong. Please try again.
            </div>
            
            <form id="modal-rsvp-form">
                <div class="form-group">
                    <label for="modal_full_name">Full Name *</label>
                    <input type="text" id="modal_full_name" name="full_name" required>
                </div>
                
                <div class="form-group">
                    <label for="modal_email">Email *</label>
                    <input type="email" id="modal_email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="modal_attending">Will you be attending? *</label>
                    <select id="modal_attending" name="attending" required>
                        <option value="">Please select...</option>
                        <option value="true">Joyfully Accept</option>
                        <option value="false">Regretfully Decline</option>
                    </select>
                </div>
                <div id="acceptRSVP" style="display: none;">
                    <div class="form-group">
                        <label for="modal_number_of_guests">Number of Guests *(including yourself)</label>

                        <select name="modal_guest_count" id="modal_number_of_guests" required></select>
                        <!-- <input type="number" id="modal_number_of_guests" name="number_of_guests" min="1" max="10" value="1" required> -->
                    </div>
                    <div id="guestsNamesFields"></div>
                    <div class="form-group">
                        <label for="modal_dinner">Will you or some of your group attend the Welcome Dinner on Thursday, February 18th, 2027 at 6 PM?</label>
                        <select name="attend_dinner" id="modal_dinner" required>
                            <option value="">Please select...</option>
                            <option value="true">Yes, we'll be there!</option>
                            <option value="false">No, we won't be able to make it.</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="dinnerPop">How many of your group will attend?</label>
                        <select name="modal_dinner_count" id="dinnerpop" required></select>
                    </div>
                    
                    <div class="form-group">
                        <label for="modal_dietary_restrictions">Dietary Restrictions</label>
                        <textarea id="modal_dietary_restrictions" name="dietary_restrictions" placeholder="Please let us know of any allergies or dietary needs..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="modal_message">Message to the Couple</label>
                        <textarea id="modal_message" name="message" placeholder="We'd love to hear from you..."></textarea>
                    </div>
                </div>
                
                
                <button type="submit" class="submit-btn" id="modalSubmitBtn">Submit RSVP</button>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script src="js/iosFix.js?v=2"></script>
    <script src="js/main.js"></script>
    <script type="module" src="js/rsvp-modal.js"></script>
</body>
</html>
